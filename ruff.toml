# Ruff configuration for the current public-readiness gate.
# Run: python -m ruff check .
#
# Full Ruff and Ruff format are intentionally not enforced yet. As of
# 2026-05-01, full Ruff reports broad legacy lint debt and formatter
# adoption would touch hundreds of files. Keep this gate focused on errors
# that can break runtime behavior until the wider cleanup has its own pass.

[lint]
# Rules enforced in this codebase right now:
#   E9   - syntax, indentation, and parser errors
#   F821 - undefined names
select = ["E9", "F821"]

# Directories that are never part of the codebase proper.
exclude = [
    "backups_pre_audit_cleanup_20260408",
    "dist",
    "dist2",
    ".venv",
    "__pycache__",
]
