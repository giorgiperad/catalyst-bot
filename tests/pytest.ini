[pytest]
# Only collect test_*.py in the project root — not *_test.py, scripts,
# temp dirs, or the greenfloor review checkout.
python_files = test_*.py
testpaths = .
norecursedirs = tmp_greenfloor_review tmp_db_* sage_docs docs .git __pycache__ sage_client_ssl
# Add the project root (parent of tests/) to sys.path so all bot modules
# (coin_manager, offer_manager, wallet, etc.) are importable from test files.
pythonpath = ..
# Integration scripts excluded via conftest.py collect_ignore (not collect_ignore_glob,
# which is unsupported in pytest 8.x ini files)
# Use sys-level capture instead of fd-level capture. fd capture uses the Windows system
# code page (cp1252) at the OS level, which can't decode the UTF-8 emoji/Unicode in
# bot_loop.py print statements (e.g. ×, 🎯, 💰), causing UnicodeDecodeError in pytest's
# contextlib teardown. sys capture uses Python StringIO which has no encoding layer.
addopts = --capture=sys
markers =
    e2e: end-to-end browser tests (opt-in via --e2e; require Playwright + chromium)
