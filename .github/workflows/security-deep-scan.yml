name: Deep Security Scan

permissions:
  contents: read

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]
  schedule:
    # Weekly dependency/supply-chain sweep, separate from Dependabot.
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install "semgrep==1.161.0"

      - name: Run Semgrep community rules
        run: semgrep scan --config=p/ci --error --metrics=off

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Gitleaks
        uses: docker://zricethezav/gitleaks:v8.30.1
        with:
          args: detect --source=/github/workspace --no-banner --redact --exit-code=1 --verbose
