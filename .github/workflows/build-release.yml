name: Build Release

# Triggers when you push a version tag (e.g. v1.0.0, v1.1.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Catalyst-windows
            ext: .zip
          - os: macos-latest
            artifact: Catalyst-macos
            ext: .zip
          - os: ubuntu-latest
            artifact: Catalyst-linux
            ext: .tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (current ubuntu-latest) dropped libwebkit2gtk-4.0-dev —
          # use the 4.1 variant, falling back to 4.0 for older runner images.
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install dependencies
        run: |
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Sync release metadata to tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python scripts/sync_release_metadata.py "${version}"
          echo "Synced release metadata to ${version}"

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test (verify binary starts)
        shell: bash
        run: |
          cd dist/Catalyst
          # Run in --flask mode so the smoke test doesn't require a display
          # on headless Linux/macOS CI runners. We're testing /api/health, not
          # the native window.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./Catalyst.exe --flask &
          else
            chmod +x ./Catalyst
            ./Catalyst --flask &
          fi
          APP_PID=$!
          # Wait up to 30 seconds for Flask to respond
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/api/health > /dev/null 2>&1; then
              echo "Smoke test PASSED — app responded on /api/health"
              kill $APP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test FAILED — app did not respond within 30 seconds"
          kill $APP_PID 2>/dev/null || true
          exit 1

      - name: Smoke test packaged Sage RPC worker (Windows)
        if: matrix.os == 'windows-latest'
        run: python scripts/packaged_sage_rpc_smoke.py --exe dist/Catalyst/Catalyst.exe

      - name: Smoke test packaged API runtime (Windows)
        if: matrix.os == 'windows-latest'
        run: python scripts/packaged_api_smoke.py --exe dist/Catalyst/Catalyst.exe

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          RELEASE_REF: ${{ github.ref_name }}
          PACKAGE_EXT: ${{ matrix.ext }}
        run: |
          $package = "${env:ARTIFACT_NAME}-${env:RELEASE_REF}${env:PACKAGE_EXT}"
          Compress-Archive -Path dist/Catalyst/* -DestinationPath $package

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        env:
          RELEASE_REF: ${{ github.ref_name }}
          CATALYST_UPDATE_SIGNING_KEY_B64: ${{ secrets.CATALYST_UPDATE_SIGNING_KEY_B64 }}
          CATALYST_RELEASE_CHANNEL_REPO: ${{ vars.CATALYST_RELEASE_CHANNEL_REPO || 'Lowestofttim/catalyst-releases' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install Inno Setup
          choco install innosetup --yes --no-progress
          # Generate release notes for the in-app updater manifest.
          gh api "repos/$($env:GITHUB_REPOSITORY)/releases/generate-notes" `
            -f tag_name="$($env:RELEASE_REF)" `
            --jq ".body" | Set-Content release_notes_generated.md
          python scripts/sanitize_release_notes.py `
            release_notes_generated.md `
            release_notes.md `
            --private-repo "$($env:GITHUB_REPOSITORY)"
          # Update version in installer script to match tag
          $version = $env:RELEASE_REF.TrimStart("v")
          (Get-Content installer.iss) -replace 'MyAppVersion     ".*"', "MyAppVersion     `"$version`"" | Set-Content installer.iss
          # Build installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          # Rename output to match release naming
          Move-Item "Output\Catalyst-Setup-$version.exe" "Catalyst-Setup-$($env:RELEASE_REF).exe"
          # Publish a checksum sidecar for manual verification and manifest signing.
          $installer = "Catalyst-Setup-$($env:RELEASE_REF).exe"
          $digest = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLower()
          "$digest  $installer" | Set-Content "${installer}.sha256" -NoNewline
          # Sign a public update manifest. The private key is only read from
          # the Actions secret; CATalyst ships the matching public key.
          if (-not $env:CATALYST_UPDATE_SIGNING_KEY_B64) {
            throw "CATALYST_UPDATE_SIGNING_KEY_B64 secret is required for signed updates"
          }
          python scripts/sign_update_manifest.py `
            --version "$($env:RELEASE_REF)" `
            --installer "$installer" `
            --sha256-file "${installer}.sha256" `
            --download-base-url "https://github.com/$($env:CATALYST_RELEASE_CHANNEL_REPO)/releases/download/$($env:RELEASE_REF)" `
            --release-url "https://github.com/$($env:CATALYST_RELEASE_CHANNEL_REPO)/releases/tag/$($env:RELEASE_REF)" `
            --release-notes-file release_notes.md `
            --out-manifest latest.json `
            --out-signature latest.json.sig
          Copy-Item latest.json "update-manifest-$($env:RELEASE_REF).json"
          Copy-Item latest.json.sig "update-manifest-$($env:RELEASE_REF).json.sig"
        shell: pwsh

      - name: Smoke test Windows installer payload
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          $installer = Resolve-Path "Catalyst-Setup-$($env:RELEASE_REF).exe"
          $installDir = Join-Path $env:RUNNER_TEMP "CatalystInstall"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $installArgs = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/NOICONS",
            "/DIR=$installDir"
          )
          $install = Start-Process -FilePath $installer -ArgumentList $installArgs -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Installer exited with code $($install.ExitCode)"
          }

          python scripts/packaged_api_smoke.py --exe (Join-Path $installDir "Catalyst.exe")

          $uninstaller = Join-Path $installDir "unins000.exe"
          if (Test-Path $uninstaller) {
            Start-Process -FilePath $uninstaller -ArgumentList @(
              "/VERYSILENT",
              "/SUPPRESSMSGBOXES",
              "/NORESTART"
            ) -Wait | Out-Null
          }

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          RELEASE_REF: ${{ github.ref_name }}
          PACKAGE_EXT: ${{ matrix.ext }}
        run: |
          package="../${ARTIFACT_NAME}-${RELEASE_REF}${PACKAGE_EXT}"
          # If PyInstaller produced a .app bundle, package it; otherwise fall back to folder
          if [ -d "dist/CATalyst.app" ]; then
            cd dist && zip -r "$package" CATalyst.app/
          else
            cd dist && zip -r "$package" Catalyst/
          fi

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          RELEASE_REF: ${{ github.ref_name }}
          PACKAGE_EXT: ${{ matrix.ext }}
        run: |
          # Add .desktop file for Linux desktop integration
          cat > dist/Catalyst/catalyst.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=CATalyst
          Comment=Chia liquidity market maker
          Exec=Catalyst
          Icon=assets/bot_icon_new.png
          Terminal=false
          Categories=Finance;Network;
          DESKTOP
          package="../${ARTIFACT_NAME}-${RELEASE_REF}${PACKAGE_EXT}"
          cd dist && tar -czf "$package" Catalyst/

      - name: Upload zip/tar to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer to Release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Catalyst-Setup-${{ github.ref_name }}.exe
            Catalyst-Setup-${{ github.ref_name }}.exe.sha256
            latest.json
            latest.json.sig
            update-manifest-${{ github.ref_name }}.json
            update-manifest-${{ github.ref_name }}.json.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish public update channel
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.CATALYST_RELEASE_CHANNEL_TOKEN }}
          RELEASE_REF: ${{ github.ref_name }}
          CATALYST_RELEASE_CHANNEL_REPO: ${{ vars.CATALYST_RELEASE_CHANNEL_REPO || 'Lowestofttim/catalyst-releases' }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Warning "CATALYST_RELEASE_CHANNEL_TOKEN is not configured; skipping public update channel publish."
            exit 0
          }
          $assets = @(
            "Catalyst-Setup-$($env:RELEASE_REF).exe",
            "Catalyst-Setup-$($env:RELEASE_REF).exe.sha256",
            "latest.json",
            "latest.json.sig",
            "update-manifest-$($env:RELEASE_REF).json",
            "update-manifest-$($env:RELEASE_REF).json.sig"
          )
          gh release view "$($env:RELEASE_REF)" --repo "$($env:CATALYST_RELEASE_CHANNEL_REPO)" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$($env:RELEASE_REF)" @assets --repo "$($env:CATALYST_RELEASE_CHANNEL_REPO)" --clobber
          } else {
            gh release create "$($env:RELEASE_REF)" @assets `
              --repo "$($env:CATALYST_RELEASE_CHANNEL_REPO)" `
              --title "CATalyst $($env:RELEASE_REF)" `
              --notes-file release_notes.md `
              --latest
          }
