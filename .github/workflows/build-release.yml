name: Build Release

# Triggers when you push a version tag (e.g. v1.0.0, v1.1.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Catalyst-windows
            ext: .zip
          - os: macos-latest
            artifact: Catalyst-macos
            ext: .zip
          - os: ubuntu-latest
            artifact: Catalyst-linux
            ext: .tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (current ubuntu-latest) dropped libwebkit2gtk-4.0-dev —
          # use the 4.1 variant, falling back to 4.0 for older runner images.
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Sync release metadata to tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python scripts/sync_release_metadata.py "${version}"
          echo "Synced release metadata to ${version}"

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test (verify binary starts)
        shell: bash
        run: |
          cd dist/Catalyst
          # Run in --flask mode so the smoke test doesn't require a display
          # on headless Linux/macOS CI runners. We're testing /api/health, not
          # the native window.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./Catalyst.exe --flask &
          else
            chmod +x ./Catalyst
            ./Catalyst --flask &
          fi
          APP_PID=$!
          # Wait up to 30 seconds for Flask to respond
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/api/health > /dev/null 2>&1; then
              echo "Smoke test PASSED — app responded on /api/health"
              kill $APP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test FAILED — app did not respond within 30 seconds"
          kill $APP_PID 2>/dev/null || true
          exit 1

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Catalyst/* -DestinationPath "${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}"

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: |
          # Install Inno Setup
          choco install innosetup --yes --no-progress
          # Update version in installer script to match tag
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content installer.iss) -replace 'MyAppVersion     ".*"', "MyAppVersion     `"$version`"" | Set-Content installer.iss
          # Build installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          # Rename output to match release naming
          Move-Item "Output\Catalyst-Setup-$version.exe" "Catalyst-Setup-${{ github.ref_name }}.exe"
        shell: pwsh

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # If PyInstaller produced a .app bundle, package it; otherwise fall back to folder
          if [ -d "dist/CATalyst.app" ]; then
            cd dist && zip -r "../${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}" CATalyst.app/
          else
            cd dist && zip -r "../${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}" Catalyst/
          fi

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Add .desktop file for Linux desktop integration
          cat > dist/Catalyst/catalyst.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=CATalyst
          Comment=Chia liquidity market maker
          Exec=Catalyst
          Icon=assets/bot_icon_new.png
          Terminal=false
          Categories=Finance;Network;
          DESKTOP
          cd dist && tar -czf "../${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}" Catalyst/

      - name: Upload zip/tar to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}-${{ github.ref_name }}${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer to Release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: Catalyst-Setup-${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
