name: Code Quality

# Runs on every push to main/test and on pull requests targeting them.
# `main` is the public default branch. The `test` branch remains covered
# while older workflow branches are still in use.
permissions:
  contents: read

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt

      - name: Verify .env.example matches config.py defaults
        run: python scripts/check_env_example.py

      - name: Syntax check (all Python files)
        run: |
          echo "Checking syntax on all .py files..."
          errors=0
          while IFS= read -r f; do
            python -c "import ast; ast.parse(open('$f', encoding='utf-8').read())" 2>&1 || {
              echo "SYNTAX ERROR: $f"
              errors=$((errors + 1))
            }
          done < <(find . -name '*.py' -not -path './.*' -not -path '*/__pycache__/*')
          if [ $errors -gt 0 ]; then
            echo "FAILED: $errors files with syntax errors"
            exit 1
          fi
          echo "All Python files pass syntax check"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Import check (critical modules)
        run: |
          echo "Verifying critical modules can be imported..."
          # Application code lives under src/catalyst/; add it to PYTHONPATH
          # so flat imports resolve.
          export PYTHONPATH="src/catalyst:$PYTHONPATH"
          python -c "
          import sys
          failed = []
          for mod in ['config', 'database', 'price_engine', 'offer_manager',
                      'fill_tracker', 'risk_manager', 'coin_manager', 'wallet',
                      'dexie_manager', 'sniper', 'bot_loop']:
              try:
                  __import__(mod)
              except Exception as e:
                  failed.append(f'{mod}: {e}')
          if failed:
              print('IMPORT FAILURES:')
              for f in failed:
                  print(f'  {f}')
              sys.exit(1)
          print('All critical modules import successfully')
          "

      - name: Dead code scan (vulture)
        run: |
          python -m vulture src/catalyst scripts desktop_app.py build.py scripts/vulture_whitelist.py --min-confidence 90

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      # pytest-xdist's --dist=loadfile runs each test file in its own worker
      # process. Combined with the module-scoped sys.modules restore fixture
      # in tests/conftest.py, this gives us reliable isolation between
      # files that stub out `database` / `wallet` / `coin_manager` etc.
      # for unit testing.
      #
      # Ignored files are live-wallet / direct-offer integration scripts that
      # are not safe to run in ordinary CI.
      - name: Run pytest
        working-directory: tests
        run: |
          python -m pytest -n 2 --dist=loadfile --tb=short \
            --ignore=test_coin_prep.py \
            --ignore=test_coin_prep_v2.py \
            --ignore=test_offer_create.py \
            --cov=../src/catalyst \
            --cov-report=term-missing

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install security tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Check for secrets in code
        run: python scripts/check_tracked_secrets.py

      - name: Bandit static security scan
        run: python -m bandit -r src --ini .bandit -ll

      - name: Python dependency vulnerability audit
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

      - name: Check .gitignore covers sensitive files
        run: |
          python -c "
          required = ['.env', '*.key', '*.pem', '*.crt', '*.db', 'sage_client_ssl/']
          with open('.gitignore') as f:
              gitignore = f.read()
          missing = [r for r in required if r not in gitignore]
          if missing:
              print(f'MISSING from .gitignore: {missing}')
              exit(1)
          print('.gitignore covers all sensitive patterns')
          "
