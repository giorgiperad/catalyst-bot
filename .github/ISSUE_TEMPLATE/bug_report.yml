name: Bug report
description: Report a confirmed bug in CATalyst
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include the information below so it can be reproduced.
        **Never paste wallet certs, private keys, or full `.env` contents.**
  - type: input
    id: version
    attributes:
      label: CATalyst version
      placeholder: e.g. v1.2.2 or v4.0.0-beta (from Help -> About or the installer filename)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: sage
    attributes:
      label: Sage wallet version
      placeholder: e.g. 0.12.10 or newer
  - type: input
    id: cat
    attributes:
      label: CAT pair
      placeholder: ticker or asset ID
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: Tail of bot_superlog_*.log from %APPDATA%\Catalyst\. Redact asset IDs if you prefer.
      render: text
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Screenshots, reproduction steps, timing, market conditions, etc.
